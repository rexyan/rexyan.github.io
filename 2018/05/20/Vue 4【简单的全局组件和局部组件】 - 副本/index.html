        <h3 id="全局组件"><a href="#全局组件" class="headerlink" title="全局组件"></a>全局组件</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br></pre></td><td class="code"><pre><span class="line">&lt;html&gt;</span><br><span class="line">&lt;head&gt;</span><br><span class="line">    &lt;meta charset=&quot;UTF-8&quot;&gt;</span><br><span class="line">    &lt;meta name=&quot;viewport&quot;</span><br><span class="line">          content=&quot;width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0&quot;&gt;</span><br><span class="line">    &lt;meta http-equiv=&quot;X-UA-Compatible&quot; content=&quot;ie=edge&quot;&gt;</span><br><span class="line">    &lt;title&gt;Document&lt;/title&gt;</span><br><span class="line"></span><br><span class="line">    &lt;!--引入vue.js--&gt;</span><br><span class="line">    &lt;script src=&quot;./vue.js&quot;&gt;&lt;/script&gt;</span><br><span class="line"></span><br><span class="line">&lt;/head&gt;</span><br><span class="line">&lt;body&gt;</span><br><span class="line">    &lt;div id=&quot;app&quot;&gt;  </span><br><span class="line">        请输入要显示的列表: &lt;input type=&quot;text&quot; v-model=&quot;inputValue&quot;&gt;&lt;/input&gt;   &lt;!--  使用v-model进行数据的双向绑定 --&gt;</span><br><span class="line">        &lt;button v-on:click=&quot;submitBtn&quot;&gt;确认&lt;/button&gt;                           &lt;!--  使用v-on:click定义一个onclick点击事件 --&gt;</span><br><span class="line">        &lt;ul&gt;</span><br><span class="line">            &lt;!--   &lt;li v-for=&quot;item in list_data&quot;&gt;&#123;&#123; item &#125;&#125;&lt;/li&gt;  之前是使用v-for循环出数据，现在我们用组件的方式实现 --&gt;</span><br><span class="line">            &lt;todo-item v-bind:content=&quot;item&quot; v-for=&quot;item in list_data&quot;&gt;  &lt;/todo-item&gt;  </span><br><span class="line">            &lt;!-- todo-item是我们定义的组件，下面定义的名称是TodoItem，我们要使用-将驼峰分开。内容是组件中定义的template，循环的次数受</span><br><span class="line">            list_data的影响。使用v-bind将list_data每个item的数据通过content传递到组件内 --&gt;</span><br><span class="line">        &lt;/ul&gt;</span><br><span class="line">    &lt;/div&gt;</span><br><span class="line">    </span><br><span class="line">    &lt;script type=&quot;text/javascript&quot;&gt;</span><br><span class="line">        //  全局组件</span><br><span class="line">        Vue.component(&quot;TodoItem&quot;, &#123;</span><br><span class="line">            props:[&apos;content&apos;],                     //使用props来接受组件外传来的参数，其中content就是传来的</span><br><span class="line">            template:&quot;&lt;li&gt; &#123;&#123; content &#125;&#125; &lt;/li&gt;&quot;    //显示传来的内容</span><br><span class="line">        &#125;)</span><br><span class="line"></span><br><span class="line">        var app = new Vue(&#123;    // 实例化一个Vue</span><br><span class="line">            el: &quot;#app&quot;,        // 使用el绑定</span><br><span class="line">            data :&#123;</span><br><span class="line">                &quot;list_data&quot;: [&quot;1111&quot;, &apos;2222&apos;, &apos;3333&apos;],   // 初始赋值</span><br><span class="line">                &quot;inputValue&quot; : &quot;&quot;</span><br><span class="line">            &#125;,</span><br><span class="line">            methods:&#123;</span><br><span class="line">                submitBtn: function()&#123;         // 定义一个onclick点击方法</span><br><span class="line">                    // alert(this.inputValue)  // 取到文本框中绑定的值</span><br><span class="line">                    this.list_data.push(this.inputValue)  // 将文本框中输入值放入到循环显示的列表中</span><br><span class="line">                    this.inputValue = &quot;&quot;                  // 将文本框清空</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;)</span><br><span class="line">    &lt;/script&gt;</span><br><span class="line">&lt;/body&gt;</span><br><span class="line">&lt;/html&gt;</span><br></pre></td></tr></table></figure>
